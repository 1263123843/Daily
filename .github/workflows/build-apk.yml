name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle 8.9
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.9-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.9/bin" >> $GITHUB_PATH

      - name: Accept Android licenses
        run: |
          yes | sdkmanager --licenses || true
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build Debug APK
        run: |
          gradle assembleDebug --stacktrace 2>&1 | tee build-output.log

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build-output.log

      - name: List APK outputs
        if: always()
        run: |
          echo "=== APK output directory ==="
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "Directory not found"
          echo "=== All outputs ==="
          find app/build/outputs -name "*.apk" 2>/dev/null || echo "No APKs found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: daily-debug-apk
          path: app/build/outputs/apk/debug/*.apk
