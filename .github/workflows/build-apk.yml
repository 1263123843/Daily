name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle 8.9
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.9-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.9/bin" >> $GITHUB_PATH

      - name: Accept Android licenses
        run: |
          yes | sdkmanager --licenses || true
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build Debug APK
        run: |
          gradle assembleDebug --stacktrace > build-output.log 2>&1
          cat build-output.log

      - name: Verify APK was built
        run: |
          APK_COUNT=$(find app/build/outputs/apk/debug -name "*.apk" -type f 2>/dev/null | wc -l)
          echo "Found $APK_COUNT APK files"
          if [ "$APK_COUNT" -eq 0 ]; then
            echo "::error::No APK files found in app/build/outputs/apk/debug/"
            echo "=== build-output.log ==="
            cat build-output.log
            exit 1
          fi
          ls -lh app/build/outputs/apk/debug/*.apk
          echo "APK verification passed!"

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build-output.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: daily-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
