name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Gradle 8.7 and generate wrapper
        run: |
          curl -L -o gradle-8.7-bin.zip https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip gradle-8.7-bin.zip
          sudo mv gradle-8.7 /opt/gradle
          sudo ln -sf /opt/gradle/bin/gradle /usr/local/bin/gradle
          gradle --version
          # Generate gradle-wrapper.jar so ./gradlew works
          gradle wrapper --gradle-version 8.7

      - name: Accept Android licenses
        run: |
          yes | sdkmanager --licenses || true
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: daily-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
